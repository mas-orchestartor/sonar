# documentation: https://docs.sonarsource.com/sonarqube-server/latest/
# slogan: SonarQube is a self-managed, automatic code review tool that systematically helps you deliver Clean Code.
# category: productivity
# tags: sonarqube, code-review, clean-code, quality, code-quality, code-analysis, static-analysis, security
# port: 9000

services:
  sonarqube:
    image: sonarqube:${SONARQUBE_VERSION:-community}
    environment:
      # Coolify: связывает домен из поля Domains с портом 9000 контейнера
      - SERVICE_URL_SONARQUBE_9000
      # Публичный URL сервера (корректные ссылки в письмах, webhook'ах, badge'ах)
      - SONAR_CORE_SERVERBASEURL=${SERVICE_URL_SONARQUBE}
      # Подключение к PostgreSQL (креды генерирует Coolify)
      - SONAR_JDBC_URL=jdbc:postgresql://postgresql:5432/${POSTGRES_DB:-sonar}
      - SONAR_JDBC_USERNAME=${SERVICE_USER_POSTGRES}
      - SONAR_JDBC_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      # Позволяет стартовать без vm.max_map_count=524288 на хосте.
      # Для продакшена лучше настроить sysctl на хосте и выставить false (см. README)
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=${SONAR_ES_BOOTSTRAP_CHECKS_DISABLE:-true}
      # Лимиты памяти JVM — подгоняйте под свой сервер
      - SONAR_WEB_JAVAOPTS=${SONAR_WEB_JAVAOPTS:--Xmx512m -Xms128m}
      - SONAR_CE_JAVAOPTS=${SONAR_CE_JAVAOPTS:--Xmx512m -Xms128m}
      - SONAR_SEARCH_JAVAOPTS=${SONAR_SEARCH_JAVAOPTS:--Xmx512m -Xms512m}
      - SONAR_TELEMETRY_ENABLE=${SONAR_TELEMETRY_ENABLE:-false}
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc: 8192
    stop_grace_period: 60s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9000/api/system/status | grep -q '\"status\":\"UP\"'",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    depends_on:
      postgresql:
        condition: service_healthy

  postgresql:
    image: postgres:${POSTGRES_VERSION:-17-alpine}
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=${POSTGRES_DB:-sonar}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 15

volumes:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  postgresql-data:
